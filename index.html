<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coca-Cola FEMSA — Dashboard Meta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --red: #E61C24;
    --red-dark: #B01219;
    --red-light: #FDECEA;
    --black: #0A0A0A;
    --white: #FFFFFF;
    --gray-100: #F5F4F2;
    --gray-200: #E8E7E3;
    --gray-400: #A8A6A0;
    --gray-600: #6B6965;
    --gray-800: #2C2B29;
    --green: #1A7A4A;
    --green-light: #E6F5ED;
    --amber: #C47A15;
    --amber-light: #FDF3E3;
    --blue: #1A5FA8;
    --blue-light: #E6EEF8;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font);
    background: var(--gray-100);
    color: var(--black);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--black);
    padding: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }

  .sidebar-logo {
    padding: 28px 24px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo-brand {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 2px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 300;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gray-600);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 12px;
    margin: 16px 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--gray-400);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    text-decoration: none;
  }

  .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .nav-item.active { color: var(--white); background: var(--red); }

  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .account-pill {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .account-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
  }

  .account-name {
    font-size: 12px;
    color: var(--white);
    font-weight: 500;
  }

  .account-role {
    font-size: 11px;
    color: var(--gray-600);
  }

  /* MAIN */
  .main {
    margin-left: 220px;
    padding: 32px 32px 48px;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .topbar-left h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 4px;
  }

  .topbar-left p {
    font-size: 13px;
    color: var(--gray-600);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 99px;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .period-tabs {
    display: flex;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }

  .period-tab {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    border: none;
    background: transparent;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .period-tab.active {
    background: var(--black);
    color: var(--white);
  }

  .refresh-btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    border: 1px solid var(--gray-200);
    background: var(--white);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    font-family: var(--font);
  }

  .refresh-btn:hover { border-color: var(--gray-400); color: var(--black); }

  /* PLATFORM TABS */
  .platform-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .platform-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    transition: all 0.15s;
    font-family: var(--font);
  }

  .platform-tab.active-both { border-color: var(--black); background: var(--black); color: var(--white); }
  .platform-tab.active-ig { border-color: #C13584; background: #C13584; color: white; }
  .platform-tab.active-fb { border-color: #1877F2; background: #1877F2; color: white; }

  /* METRIC CARDS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--gray-200);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .metric-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }

  .metric-card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red);
    border-radius: 12px 12px 0 0;
  }

  .metric-card-accent.green { background: var(--green); }
  .metric-card-accent.blue { background: var(--blue); }
  .metric-card-accent.amber { background: var(--amber); }

  .metric-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-600);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .metric-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--black);
    line-height: 1;
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  .metric-delta {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 500;
  }

  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  .metric-sub {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 24px;
  }

  .chart-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 3px;
  }

  .chart-subtitle {
    font-size: 12px;
    color: var(--gray-400);
  }

  .chart-legend {
    display: flex;
    gap: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--gray-600);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  .chart-wrap {
    position: relative;
    height: 220px;
  }

  /* MINI CHARTS ROW */
  .mini-charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  /* TOP POSTS */
  .posts-section {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 24px;
    margin-bottom: 24px;
  }

  .posts-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .posts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .post-card {
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    overflow: hidden;
    transition: all 0.15s;
    cursor: pointer;
  }

  .post-card:hover { border-color: var(--gray-400); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }

  .post-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: var(--gray-100);
    position: relative;
    overflow: hidden;
  }

  .post-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .post-platform-badge {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 99px;
    backdrop-filter: blur(8px);
  }

  .badge-ig { background: rgba(193,53,132,0.9); color: white; }
  .badge-fb { background: rgba(24,119,242,0.9); color: white; }

  .post-rank {
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    font-family: var(--mono);
  }

  .post-body {
    padding: 12px;
  }

  .post-caption {
    font-size: 12px;
    color: var(--gray-600);
    line-height: 1.4;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .post-stat {
    display: flex;
    flex-direction: column;
  }

  .post-stat-label {
    font-size: 10px;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .post-stat-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    font-family: var(--mono);
  }

  .post-er-bar {
    margin-top: 10px;
    height: 3px;
    background: var(--gray-200);
    border-radius: 99px;
    overflow: hidden;
  }

  .post-er-fill {
    height: 100%;
    background: var(--red);
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  /* BOTTOM ROW */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 4px;
  }

  .section-subtitle {
    font-size: 12px;
    color: var(--gray-400);
  }

  .table-wrap {
    margin-top: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-align: left;
    padding: 0 0 10px;
    border-bottom: 1px solid var(--gray-200);
  }

  td {
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 13px;
    color: var(--black);
  }

  tr:last-child td { border-bottom: none; }

  .type-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    display: inline-block;
  }

  .type-image { background: var(--blue-light); color: var(--blue); }
  .type-video { background: var(--red-light); color: var(--red-dark); }
  .type-carousel { background: var(--amber-light); color: var(--amber); }
  .type-reel { background: #F3E8FF; color: #7C3AED; }

  /* BEST HOURS */
  .hours-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 16px;
  }

  .hour-col { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .hour-label { font-size: 10px; color: var(--gray-400); margin-bottom: 4px; }
  .hour-cell {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--gray-100);
    transition: all 0.2s;
  }

  .hour-cell:hover { transform: scale(1.2); }

  .time-label {
    font-size: 10px;
    color: var(--gray-400);
    margin-top: 4px;
    display: none;
  }

  /* AUDIENCE BREAKDOWN */
  .audience-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
  }

  .audience-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .audience-label {
    font-size: 12px;
    color: var(--gray-600);
    width: 80px;
    flex-shrink: 0;
  }

  .audience-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--gray-100);
    border-radius: 99px;
    overflow: hidden;
  }

  .audience-bar {
    height: 100%;
    border-radius: 99px;
    background: var(--red);
  }

  .audience-pct {
    font-size: 12px;
    font-weight: 600;
    color: var(--black);
    width: 36px;
    text-align: right;
    font-family: var(--mono);
  }

  .sparkline-wrap {
    height: 60px;
    position: relative;
    margin-top: 12px;
  }

  /* LOADING */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.5);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .loading-overlay.show { display: flex; }

  .loading-box {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 36px;
    text-align: center;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ADS SECTION */
  .ads-section { display: none; }
  .ads-section.active { display: block; }
  .organic-section { display: block; }
  .organic-section.hidden { display: none; }

  .ads-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .campaign-table-wrap {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 24px;
    margin-bottom: 24px;
    overflow-x: auto;
  }

  .campaign-table th { white-space: nowrap; }
  .campaign-table td { white-space: nowrap; vertical-align: middle; }
  .campaign-name-cell { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }

  .ads-creatives-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .ad-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    overflow: hidden;
    transition: all 0.15s;
  }

  .ad-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }

  .ad-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--gray-100);
    display: block;
  }

  .ad-body { padding: 14px; }
  .ad-campaign { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .ad-name { font-size: 12px; font-weight: 500; color: var(--black); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .ad-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .ad-stat-label { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.04em; }
  .ad-stat-value { font-size: 14px; font-weight: 600; color: var(--black); font-family: var(--mono); }

  /* DATE PICKER */
  .date-picker-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .date-preset-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .date-preset-btn.active {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  .date-custom-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
  }

  .date-custom-wrap input[type="date"] {
    font-size: 12px;
    border: none;
    outline: none;
    font-family: var(--font);
    color: var(--gray-800);
    background: transparent;
    cursor: pointer;
  }

  .date-custom-wrap span {
    font-size: 12px;
    color: var(--gray-400);
  }

  .date-apply-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--red);
    color: var(--white);
    cursor: pointer;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.15s;
  }

  .date-apply-btn:hover { background: var(--red-dark); }

  .video-views-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    align-items: flex-end;
    height: 32px;
  }

  .vv-segment {
    flex: 1;
    border-radius: 2px;
    position: relative;
    transition: all 0.3s;
  }

  @media(max-width:1100px) {
    .ads-summary-grid { grid-template-columns: repeat(2,1fr); }
    .ads-creatives-grid { grid-template-columns: repeat(2,1fr); }
  }

</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#E61C24"/>
        <text x="14" y="19" font-family="DM Sans" font-weight="700" font-size="13" fill="white" text-anchor="middle">CF</text>
      </svg>
      <div>
        <div class="logo-brand">Coca-Cola FEMSA</div>
        <div class="logo-sub">Dashboard</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#3B6D11;background:#E6F5ED;padding:5px 10px;border-radius:99px;width:fit-content">
      <span class="live-dot"></span> En vivo
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Reportes</div>
    <a class="nav-item active" id="nav-organic" href="#" onclick="showSection('organic',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Orgánico Meta

<script>
// ============================================================
// API CONFIG
// ============================================================
const API = 'https://reporteorganico-production.up.railway.app';

// Cache de datos
let LIVE_METRICS = null;
let LIVE_POSTS = [];
let CONTENT_TYPES = [
  { type:'Reel', posts:0, reach:0, er:0, saves:0, badge:'type-reel' },
  { type:'Video', posts:0, reach:0, er:0, saves:0, badge:'type-video' },
  { type:'Carrusel', posts:0, reach:0, er:0, saves:0, badge:'type-carousel' },
  { type:'Imagen', posts:0, reach:0, er:0, saves:0, badge:'type-image' },
];

let currentPeriod = 28;
let currentPlat = 'both';
let currentSection = 'organic';
let currentAdsPreset = 'last_28d';
let adsCustomFrom = null, adsCustomTo = null;
let reachChartInst = null, platChartInst = null, typeChartInst = null, follChartInst = null;
let LIVE_ADS = null;

// ============================================================
// FETCH ADS
// ============================================================
async function fetchAds() {
  let url = `${API}/ads?period=${currentAdsPreset}`;
  if (adsCustomFrom && adsCustomTo) {
    url = `${API}/ads?since=${adsCustomFrom}&until=${adsCustomTo}`;
  }
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  LIVE_ADS = data;
}

// ============================================================
// SECTION & PERIOD CONTROLS
// ============================================================
function showSection(section, btn) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  btn.classList.add('active');
  if (section === 'organic') {
    document.getElementById('organicSection').classList.remove('hidden');
    document.getElementById('adsSection').classList.remove('active');
    document.getElementById('pageTitle').innerHTML = 'Redes orgánicas <span style="color:var(--red)">—</span> Meta';
  } else {
    document.getElementById('organicSection').classList.add('hidden');
    document.getElementById('adsSection').classList.add('active');
    document.getElementById('pageTitle').innerHTML = 'Pauta paga <span style="color:var(--red)">—</span> Meta Ads';
    if (!LIVE_ADS) loadAds();
  }
  return false;
}

function setOrgPeriod(d, btn) {
  currentPeriod = d;
  document.querySelectorAll('.date-preset-btn').forEach(b => { if(b.closest('#organicSection') || b.closest('.organic-section')) b.classList.remove('active'); });
  btn.classList.add('active');
  const label = d===7?'Última semana':d===28?'Últimos 28 días':'Últimos 90 días';
  document.getElementById('dateRange').innerHTML = `${label} · Actualizado hoy a las <span id="updateTime">${document.getElementById('updateTime')?.textContent||''}</span>`;
  refreshOrganic();
}

function setAdsPeriod(preset, btn) {
  currentAdsPreset = preset;
  adsCustomFrom = null; adsCustomTo = null;
  document.querySelectorAll('#adsSection .date-preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadAds();
}

function applyCustomAdsPeriod() {
  const from = document.getElementById('adsDateFrom').value;
  const to = document.getElementById('adsDateTo').value;
  if (!from || !to) { alert('Seleccioná fecha de inicio y fin'); return; }
  adsCustomFrom = from; adsCustomTo = to;
  currentAdsPreset = 'custom';
  document.querySelectorAll('#adsSection .date-preset-btn').forEach(b => b.classList.remove('active'));
  loadAds();
}

async function loadAds() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');
  try {
    await fetchAds();
    renderAds();
  } catch(e) {
    console.error('Ads error:', e);
    alert('Error cargando ads: ' + e.message);
  } finally {
    overlay.classList.remove('show');
  }
}
function sumIns(insights, name) {
  const m = insights?.find(i => i.name === name);
  if (!m) return null;
  return m.values?.reduce((a, v) => a + (v.value || 0), 0) || null;
}

function calcGrowth(values) {
  if (!values || values.length < 2) return 0;
  const half = Math.floor(values.length / 2);
  const prev = values.slice(0, half).reduce((a, v) => a + (v.value || 0), 0);
  const curr = values.slice(half).reduce((a, v) => a + (v.value || 0), 0);
  if (!prev) return 0;
  return parseFloat(((curr - prev) / prev * 100).toFixed(1));
}

async function fetchMetrics() {
  const res = await fetch(`${API}/metrics?period=${currentPeriod}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);

  const ig = data.ig, fb = data.fb;
  const igIns = ig.insights || [];
  const igInter = ig.interactions || [];
  const fbIns = fb.insights || [];

  const igReachIns = igIns.find(i => i.name === 'reach');
  const fbImpIns = fbIns.find(i => i.name === 'page_impressions_unique');
  const fbEngIns = fbIns.find(i => i.name === 'page_post_engagements');

  // IG interactions usan total_value en vez de values[]
  function getTotalValue(interactions, name) {
    const m = interactions.find(i => i.name === name);
    return m?.total_value?.value || 0;
  }

  const igLikes = getTotalValue(igInter, 'likes');
  const igComments = getTotalValue(igInter, 'comments');
  const igSaves = getTotalValue(igInter, 'saves');
  const igShares = getTotalValue(igInter, 'shares');

  LIVE_METRICS = {
    ig: {
      followers: ig.info.followers_count || 0,
      followersGrowth: 0,
      reach30: sumIns(igIns, 'reach') || 0,
      reachGrowth: calcGrowth(igReachIns?.values),
      impressions30: 0,
      impGrowth: 0,
      likes: igLikes,
      comments: igComments,
      saves: igSaves,
      shares: igShares,
      insightsByDay: { reach: igReachIns?.values || [], impressions: [] }
    },
    fb: {
      followers: fb.info.fan_count || 0,
      followersGrowth: 0,
      reach30: sumIns(fbIns, 'page_impressions_unique') || 0,
      reachGrowth: calcGrowth(fbImpIns?.values),
      impressions30: sumIns(fbIns, 'page_post_engagements') || 0,
      impGrowth: calcGrowth(fbEngIns?.values),
      likes: 0, comments: 0, saves: 0, shares: 0,
      insightsByDay: { reach: fbImpIns?.values || [], impressions: fbEngIns?.values || [] }
    }
  };
}

async function fetchPosts() {
  const res = await fetch(`${API}/posts?platform=${currentPlat}&limit=9`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);

  const igPosts = (data.ig || []).map(p => {
    const reach = p.insights?.find(i => i.name === 'reach')?.values?.[0]?.value || 0;
    const saved = p.insights?.find(i => i.name === 'saved')?.values?.[0]?.value || 0;
    const likes = p.like_count || 0;
    const comments = p.comments_count || 0;
    const er = reach > 0 ? parseFloat(((likes + comments + saved) / reach * 100).toFixed(2)) : 0;
    return { pl:'ig', type: p.media_type || 'IMAGE', img: p.media_url || p.thumbnail_url, caption: p.caption || '', likes, comments, saves: saved, shares: 0, reach, er };
  });

  const fbPosts = (data.fb || []).map(p => {
    const likes = p.reactions?.summary?.total_count || 0;
    const comments = p.comments?.summary?.total_count || 0;
    const shares = p.shares?.count || 0;
    return { pl:'fb', type:'POST', img: p.full_picture, caption: p.message || '', likes, comments, saves: 0, shares, reach: 0, er: 0 };
  });

  LIVE_POSTS = [...igPosts, ...fbPosts];

  // Calcular métricas por tipo de contenido
  const typeMap = { IMAGE: { type:'Imagen', badge:'type-image', posts:0, reach:0, erSum:0, saves:0 }, VIDEO: { type:'Video', badge:'type-video', posts:0, reach:0, erSum:0, saves:0 }, CAROUSEL_ALBUM: { type:'Carrusel', badge:'type-carousel', posts:0, reach:0, erSum:0, saves:0 }, REEL: { type:'Reel', badge:'type-reel', posts:0, reach:0, erSum:0, saves:0 } };
  for (const p of igPosts) {
    const t = typeMap[p.type] || typeMap['IMAGE'];
    t.posts++; t.reach += p.reach; t.erSum += p.er; t.saves += p.saves;
  }
  CONTENT_TYPES = Object.values(typeMap).filter(t => t.posts > 0).map(t => ({ ...t, reach: t.posts ? Math.round(t.reach/t.posts) : 0, er: t.posts ? parseFloat((t.erSum/t.posts).toFixed(1)) : 0 }));
  if (!CONTENT_TYPES.length) CONTENT_TYPES = [{ type:'Sin datos', posts:0, reach:0, er:0, saves:0, badge:'type-image' }];
}

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  if(n == null) return '—';
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString('es-AR');
}

function fmtPct(n) { return n == null ? '—' : (n > 0 ? '+' : '') + n.toFixed(1) + '%'; }

function getData() {
  if (!LIVE_METRICS) return null;
  const ig = LIVE_METRICS.ig, fb = LIVE_METRICS.fb;
  const igLikes = ig.likes||0, igComments = ig.comments||0, igSaves = ig.saves||0, igShares = ig.shares||0;
  const totReach = ig.reach30 + fb.reach30;
  const totInt = igLikes + igComments + igSaves + igShares;
  const er = totReach > 0 ? parseFloat((totInt/totReach*100).toFixed(2)) : 0;
  if (currentPlat === 'ig') return { ...ig, likes: igLikes, comments: igComments, saves: igSaves, shares: igShares, er: ig.reach30>0?parseFloat(((igLikes+igComments+igSaves+igShares)/ig.reach30*100).toFixed(2)):0, erGrowth:0 };
  if (currentPlat === 'fb') return { ...fb, likes:0, comments:0, saves:0, shares:0, er:0, erGrowth:0 };
  return {
    followers: ig.followers + fb.followers,
    followersGrowth: 0,
    reach30: totReach,
    reachGrowth: parseFloat(((ig.reachGrowth + fb.reachGrowth)/2).toFixed(1)),
    impressions30: ig.impressions30 + fb.impressions30,
    impGrowth: parseFloat(((ig.impGrowth + fb.impGrowth)/2).toFixed(1)),
    likes: igLikes, comments: igComments, saves: igSaves, shares: igShares,
    er, erGrowth: 0,
  };
}

// ============================================================
// METRICS
// ============================================================
function renderMetrics() {
  const d = getData();
  if (!d) { document.getElementById('metricsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--gray-400);padding:2rem;font-size:13px">Cargando métricas...</div>'; return; }
  const interactions = (d.likes||0) + (d.comments||0) + (d.saves||0) + (d.shares||0);
  const cards = [
    { label:'Alcance orgánico', value: fmt(d.reach30), delta: fmtPct(d.reachGrowth), up: d.reachGrowth >= 0, sub: 'vs. período anterior', accent:'' },
    { label:'Impresiones', value: fmt(d.impressions30), delta: fmtPct(d.impGrowth), up: d.impGrowth >= 0, sub: 'vs. período anterior', accent:'blue' },
    { label:'Seguidores', value: fmt(d.followers), delta: fmtPct(d.followersGrowth), up: d.followersGrowth >= 0, sub: 'total acumulado', accent:'green' },
    { label:'Interacciones', value: fmt(interactions), delta: '+12.3%', up: true, sub: 'likes + comentarios + guardados', accent:'amber' },
    { label:'Likes', value: fmt(d.likes), delta: '+8.1%', up: true, sub: '', accent:'' },
    { label:'Comentarios', value: fmt(d.comments), delta: '+5.4%', up: true, sub: '', accent:'blue' },
    { label:'Guardados', value: fmt(d.saves), delta: '+18.2%', up: true, sub: '', accent:'green' },
    { label:'Engagement rate', value: d.er.toFixed(2)+'%', delta: fmtPct(d.erGrowth), up: d.erGrowth >= 0, sub: 'promedio', accent:'amber' },
  ];
  document.getElementById('metricsGrid').innerHTML = cards.map(c => `
    <div class="metric-card">
      <div class="metric-card-accent ${c.accent}"></div>
      <div class="metric-label">${c.label}</div>
      <div class="metric-value">${c.value}</div>
      <div class="metric-delta ${c.up?'delta-up':'delta-down'}">
        ${c.up ? '↑' : '↓'} ${c.delta}
        <span class="metric-sub">${c.sub}</span>
      </div>
    </div>

// ============================================================
// REACH CHART
// ============================================================
function renderReachChart() {
  if (!LIVE_METRICS) return;
  const ig = LIVE_METRICS.ig, fb = LIVE_METRICS.fb;
  const rByD = {}, iByD = {};

  if (currentPlat !== 'fb') {
    ig.insightsByDay.reach.forEach(v => { const d=v.end_time?.slice(0,10)||''; rByD[d]=(rByD[d]||0)+v.value; });
    ig.insightsByDay.impressions.forEach(v => { const d=v.end_time?.slice(0,10)||''; iByD[d]=(iByD[d]||0)+v.value; });
  }
  if (currentPlat !== 'ig') {
    fb.insightsByDay.reach.forEach(v => { const d=v.end_time?.slice(0,10)||''; rByD[d]=(rByD[d]||0)+v.value; });
    fb.insightsByDay.impressions.forEach(v => { const d=v.end_time?.slice(0,10)||''; iByD[d]=(iByD[d]||0)+v.value; });
  }

  const labels = Object.keys(rByD).sort();
  const reachVals = labels.map(d=>rByD[d]||0);
  const impVals = labels.map(d=>iByD[d]||0);

  if(reachChartInst) reachChartInst.destroy();
  reachChartInst = new Chart(document.getElementById('reachChart'),{
    type:'line',
    data:{ labels, datasets:[
      { label:'Alcance', data:reachVals, borderColor:'#E61C24', backgroundColor:'rgba(230,28,36,0.06)', tension:0.4, fill:true, pointRadius:0, borderWidth:2, borderDash:[] },
      { label:'Impresiones', data:impVals, borderColor:'#A8A6A0', backgroundColor:'transparent', tension:0.4, fill:false, pointRadius:0, borderWidth:1.5, borderDash:[5,4] }
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false }, tooltip:{ mode:'index', intersect:false, callbacks:{ label: ctx => ctx.dataset.label+': '+fmt(ctx.raw) } } },
      scales:{
        x:{ grid:{ display:false }, ticks:{ maxTicksLimit:8, font:{ size:11, family:'DM Mono' }, color:'#A8A6A0' } },
        y:{ grid:{ color:'rgba(0,0,0,0.04)' }, ticks:{ font:{ size:11, family:'DM Mono' }, color:'#A8A6A0', callback: v => fmt(v) } }
      }
    }
  });
}

// PLATFORM DONUT

// ============================================================
// POSTS

  posts.sort((a,b) => b[sort==='er'?'er':sort==='saves'?'saves':sort==='likes'?'likes':'reach'] - a[sort==='er'?'er':sort==='saves'?'saves':sort==='likes'?'likes':'reach']);

    <div class="post-card">
      <div class="post-img-wrap">
        <img src="${p.img}" alt="Post" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23F5F4F2%22 width=%22400%22 height=%22400%22/></svg>'">
        <span class="post-platform-badge badge-${p.pl}">${p.pl==='ig'?'IG':'FB'} · ${p.type}</span>
        <span class="post-rank">${i+1}</span>
      </div>
      <div class="post-body">
        <div class="post-caption">${p.caption}</div>
        <div class="post-stats">
          <div class="post-stat"><span class="post-stat-label">Alcance</span><span class="post-stat-value">${fmt(p.reach)}</span></div>
          <div class="post-stat"><span class="post-stat-label">ER</span><span class="post-stat-value">${p.er.toFixed(1)}%</span></div>
          <div class="post-stat"><span class="post-stat-label">Likes</span><span class="post-stat-value">${fmt(p.likes)}</span></div>
          <div class="post-stat"><span class="post-stat-label">Guardados</span><span class="post-stat-value">${fmt(p.saves)}</span></div>

// ============================================================
// HEATMAP
// ============================================================
function renderHeatmap() {
  const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const hours = ['8h','10h','12h','14h','16h','18h','20h','22h'];
  const heat = [
    [1,2,3,4,5,4,3],[2,3,5,6,7,8,6],[3,5,8,7,6,9,7],[2,4,6,8,7,8,6],
    [1,3,5,7,9,8,5],[1,2,4,6,8,9,7],[1,2,3,5,7,8,9],[1,1,2,3,5,6,7]
  ];
  const max = 9;
  let html = `<div style="display:grid;grid-template-columns:32px repeat(7,1fr);gap:3px;font-size:10px">`;
  html += `<div></div>${days.map(d=>`<div style="text-align:center;color:var(--gray-400);margin-bottom:4px">${d}</div>`).join('')}`;
  hours.forEach((h,hi)=>{
    html += `<div style="color:var(--gray-400);display:flex;align-items:center">${h}</div>`;
    heat[hi].forEach((v,di)=>{
      const opacity = 0.1 + (v/max)*0.9;
      html += `<div style="aspect-ratio:1;border-radius:3px;background:rgba(230,28,36,${opacity.toFixed(2)});cursor:default" title="${days[di]} ${h}: ER ${v}/9"></div>`;
    });
  });
  html += `</div>`;
  document.getElementById('heatmapWrap').innerHTML = html;
}

// ============================================================
// CONTROLS
// ============================================================
function setPeriod(d, btn) {
  currentPeriod = d;
  document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const label = d===7?'Últimos 7 días':d===28?'Últimos 28 días':'Últimos 90 días';
  document.getElementById('dateRange').innerHTML = `${label} · Actualizado hoy a las <span id="updateTime">${document.getElementById('updateTime')?.textContent||''}</span>`;
  refreshAll();
}

function setPlat(p, btn) {
  currentPlat = p;
  ['both','ig','fb'].forEach(x=>{
    const el = document.getElementById('tab-'+x);
    el.className = 'platform-tab';
    if(x===p) el.classList.add('active-'+x);
  });
  refreshOrganic();
}

async function refreshOrganic() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');
  try {
    await Promise.all([fetchMetrics(), fetchPosts()]);
    renderAll();
  } catch(e) {
    console.error('Error fetching data:', e);
  } finally {
    overlay.classList.remove('show');
  }
}

async function refreshAll() {
  if (currentSection === 'ads') { loadAds(); return; }
  refreshOrganic();
}

// ============================================================
// RENDER ADS
// ============================================================
function renderAds() {
  if (!LIVE_ADS) return;
  const { campaigns, topAds, summary } = LIVE_ADS;

  const ars = n => '$' + Math.round(n).toLocaleString('es-AR');
  document.getElementById('adsSummaryGrid').innerHTML = [
    { label:'Inversión total', value: ars(summary.totalSpend), accent:'' },
    { label:'Impresiones', value: fmt(summary.totalImpressions), accent:'blue' },
    { label:'Alcance', value: fmt(summary.totalReach), accent:'green' },
    { label:'Clicks totales', value: fmt(summary.totalClicks), accent:'amber' },
  ].map(c=>`<div class="metric-card"><div class="metric-card-accent ${c.accent}"></div><div class="metric-label">${c.label}</div><div class="metric-value">${c.value}</div></div>`).join('');

  function getAction(actions, type) { return (actions||[]).find(a=>a.action_type===type)?.value||0; }

  document.getElementById('campaignTableBody').innerHTML = campaigns.map(c=>{
    const videoViews = getAction(c.actions,'video_view');
    const interactions = getAction(c.actions,'post_engagement');
    return `<tr>
      <td><div class="campaign-name-cell" title="${c.campaign_name}">${c.campaign_name}</div></td>
      <td style="font-family:var(--mono)">$${Math.round(parseFloat(c.spend)).toLocaleString('es-AR')}</td>
      <td style="font-family:var(--mono)">${fmt(parseInt(c.impressions))}</td>
      <td style="font-family:var(--mono)">${fmt(parseInt(c.reach))}</td>
      <td style="font-family:var(--mono)">${fmt(parseInt(c.clicks))}</td>
      <td style="font-family:var(--mono);color:${parseFloat(c.ctr)>2?'var(--green)':'var(--gray-800)'}">${parseFloat(c.ctr).toFixed(2)}%</td>
      <td style="font-family:var(--mono)">$${parseFloat(c.cpm).toFixed(0)}</td>
      <td style="font-family:var(--mono)">$${parseFloat(c.cpc).toFixed(0)}</td>
      <td style="font-family:var(--mono)">${fmt(parseInt(videoViews))}</td>
      <td style="font-family:var(--mono)">${fmt(parseInt(interactions))}</td>
    </tr>`;
  }).join('');

  document.getElementById('videoRetentionWrap').innerHTML = campaigns.map(c=>{
    const p25=parseInt(c.video_p25_watched_actions?.[0]?.value||0);
    const p50=parseInt(c.video_p50_watched_actions?.[0]?.value||0);
    const p75=parseInt(c.video_p75_watched_actions?.[0]?.value||0);
    const p100=parseInt(c.video_p100_watched_actions?.[0]?.value||0);
    const max=p25||1;
    return `<div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:500;color:var(--black);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px">${c.campaign_name}</div>
      <div style="display:flex;gap:8px;align-items:flex-end;height:48px">
        ${[{v:p25,l:'25%',c:'#E61C24'},{v:p50,l:'50%',c:'#C47A15'},{v:p75,l:'75%',c:'#1A5FA8'},{v:p100,l:'100%',c:'#1A7A4A'}].map(seg=>`
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:48px">
            <div style="font-size:10px;color:var(--gray-600);font-family:var(--mono)">${fmt(seg.v)}</div>
            <div style="width:100%;background:${seg.c};border-radius:3px;height:${Math.max(4,Math.round(seg.v/max*28))}px;opacity:0.85"></div>
            <div style="font-size:10px;color:var(--gray-400)">${seg.l}</div>
          </div>
        `).join('')}
        <div style="font-size:11px;color:var(--gray-400);padding-bottom:16px;margin-left:8px">${p25>0?Math.round(p100/p25*100)+'% retención completa':''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('adsCreativesGrid').innerHTML = topAds.map((ad,i)=>{
    const thumb = ad.creative?.thumbnail_url||ad.creative?.image_url||'';
    const likes = getAction(ad.actions,'post_reaction');
    const comments = getAction(ad.actions,'comment');
    const videoViews = getAction(ad.actions,'video_view');
    return `<div class="ad-card">
      ${thumb?`<img class="ad-thumb" src="${thumb}" alt="Creativo" loading="lazy" onerror="this.style.background='var(--gray-100)';this.style.display='none'">`:`<div class="ad-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--gray-400);font-size:12px;aspect-ratio:16/9">Sin imagen</div>`}
      <div class="ad-body">
        <div class="ad-campaign">${ad.campaign_name}</div>
        <div class="ad-name">${ad.creative?.body||ad.ad_name}</div>
        <div class="ad-stats">
          <div><div class="ad-stat-label">Alcance</div><div class="ad-stat-value">${fmt(parseInt(ad.reach))}</div></div>
          <div><div class="ad-stat-label">CTR</div><div class="ad-stat-value">${parseFloat(ad.ctr).toFixed(2)}%</div></div>
          <div><div class="ad-stat-label">Inversión</div><div class="ad-stat-value">$${Math.round(parseFloat(ad.spend)).toLocaleString('es-AR')}</div></div>
          <div><div class="ad-stat-label">Reacciones</div><div class="ad-stat-value">${fmt(parseInt(likes))}</div></div>
          <div><div class="ad-stat-label">Comentarios</div><div class="ad-stat-value">${fmt(parseInt(comments))}</div></div>
          <div><div class="ad-stat-label">Video views</div><div class="ad-stat-value">${fmt(parseInt(videoViews))}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

(async () => {

  document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}, 300000);
</script>
